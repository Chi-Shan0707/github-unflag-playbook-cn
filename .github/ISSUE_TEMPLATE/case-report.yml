name: 📋 提交案例 / Submit Case
description: 分享你被 flag 的经历，帮助我们完善案例库 / Share your flagged experience to help improve the case library
title: '[案例] '
labels: ['case']
body:
  - type: markdown
    attributes:
      value: |
        感谢你愿意分享经历。请尽量填写以下信息，所有字段均为可选，但填写越完整，对其他人的帮助越大。
        Thank you for sharing your experience. All fields are optional, but the more complete, the more helpful for others.

  - type: input
    id: username
    attributes:
      label: GitHub 用户名 / Username
      placeholder: e.g. chi-shan0707
    validations:
      required: true

  - type: input
    id: region
    attributes:
      label: 地区 / Region
      placeholder: e.g. 中国大陆 / Mainland China

  - type: input
    id: date-discovered
    attributes:
      label: 发现被 flag 的时间 / Date Discovered
      placeholder: e.g. 2025-04

  - type: checkboxes
    id: symptoms
    attributes:
      label: 症状 / Symptoms
      options:
        - label: 主页 404（别人看不到）/ Profile 404 to others
        - label: Contributions 消失 / Contributions disappeared
        - label: 第三方授权失败 / Third-party auth failed
        - label: GitHub Pages 不可访问 / GitHub Pages inaccessible
        - label: 搜索不到 / Not searchable
        - label: 外部登录失败 / External login failed
        - label: 收到 GitHub 警告邮件 / Received warning email
        - label: 其他 / Other

  - type: textarea
    id: description
    attributes:
      label: 详细描述 / Detailed Description
      placeholder: 描述你遇到的情况...

  - type: textarea
    id: appeal-timeline
    attributes:
      label: 申诉时间线 / Appeal Timeline
      placeholder: 何时提交 appeal，Support 如何回复，是否恢复...

  - type: dropdown
    id: status
    attributes:
      label: 当前状态 / Current Status
      options:
        - 未恢复 / Not recovered
        - 恢复中 / In progress
        - 已恢复 / Recovered

  - type: textarea
    id: message
    attributes:
      label: 你想对其他被 flag 的人说的话 / Message to Others
      placeholder: 建议、鼓励，或任何你想说的...

  - type: checkboxes
    id: consent
    attributes:
      label: 同意声明 / Consent
      options:
        - label: 我同意将以上信息在本仓库中公开 / I consent to publishing this information
          required: true
        - label: 我同意在案例总览表中列出我的基本信息 / I consent to listing my basic info in the overview table
        - label: 我理解我可以随时要求删除或修改我的案例 / I understand I can request deletion or modification at any time

  - type: markdown
    attributes:
      value: |
        ---
        提交后维护者会帮你整理成标准格式。你也可以直接提交 PR（复制 `cases/template.md` 填写）。
        Maintainers will help format this after submission. You may also submit a PR directly (copy `cases/template.md`).
